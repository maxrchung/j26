syntax = "proto3";

package jamserver.rpc;

// Required C# namespaces (for code generation tools like Grpc.Tools)
option csharp_namespace = "JamServer.RPC";

// -------------------------------------------------------------------
// Missing/Inferred Types
// These were referenced in your C# code but not defined in the snippets.
// -------------------------------------------------------------------

enum CardSuit {
  CARD_SUIT_UNSPECIFIED = 0; // Protobuf enums must start with a 0 value
  // Add your suits (e.g., CLUBS = 1, DIAMONDS = 2, etc.)
}

enum CardValue {
  CARD_VALUE_UNSPECIFIED = 0;
  // Add your values (e.g., ACE = 1, TWO = 2, etc.)
}

enum GetInfoType {
  GET_INFO_TYPE_UNSPECIFIED = 0;
  GET_INFO_TYPE_LOBBIES = 1;
}

// Placeholder for the missing GameLobbyPlayer / LobbyListEntry reference
message LobbyListEntry {
  // Add fields here based on BalaloGame.LobbyListEntry
}

// -------------------------------------------------------------------
// Requests
// -------------------------------------------------------------------

message ConnectRequest {
  string version = 1;
}

message JoinRequest {
  string lobby_id = 1; // Guids are typically passed as UUID strings in Protobuf
  string player_name = 2;
}

message RpcRequest {
  int32 id = 1;
  
  // Note: If an RpcRequest is only ever ONE of these types at a time, 
  // you might want to wrap these three fields in a `oneof` block instead.
  ConnectRequest connect = 2;
  GetInfoType get_info = 3;
  JoinRequest join = 4;
}

// -------------------------------------------------------------------
// Responses
// -------------------------------------------------------------------

message OkResponse {
  string msg = 1;
}

message LobbyPlayer {
  string id = 1; // Guid -> string
  string name = 2;
}

message LobbyChangeMessage {
  string id = 1; // Guid -> string
  string name = 2;
  repeated LobbyPlayer players = 3; // IReadOnlyList maps to repeated
}

message CardInfo {
  CardSuit suit = 1;
  CardValue value = 2;
}

message DeckInfo {
  repeated CardInfo cards = 1;
}

message PlayerHandInfo {
  string id = 1; // Guid -> string
  int32 card_count = 2;
  repeated CardInfo cards = 3;
}

message RpcResponse {
  int32 id = 1;

  OkResponse ok = 2;
  repeated LobbyListEntry lobby_list = 3;
  LobbyChangeMessage lobby_change = 4;
  DeckInfo deck = 5;
  repeated PlayerHandInfo player_hands = 6;
  string local_id_change = 7; // Guid -> string
  string error = 8;
}